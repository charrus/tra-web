{% extends "base.html" %}
{% block title %}Change Password - TRA Treasurer{% endblock %}
{% block content %}
<h1>Change Password</h1>

<div class="card" style="max-width: 450px;">
    <form method="post">
        <div class="field">
            <label for="current_password">Current Password</label>
            <input type="password" id="current_password" name="current_password" required>
        </div>
        <div class="field">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" required minlength="4">
        </div>
        <div class="field">
            <label for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="4">
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-primary">Change Password</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
