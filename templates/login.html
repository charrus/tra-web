<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TRA Treasurer</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --text: #0f172a;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Animated background */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: .35;
            animation: float 12s ease-in-out infinite;
        }
        .bg-orb:nth-child(1) {
            width: 500px; height: 500px;
            background: #6366f1;
            top: -10%; left: -10%;
            animation-duration: 14s;
        }
        .bg-orb:nth-child(2) {
            width: 400px; height: 400px;
            background: #8b5cf6;
            bottom: -10%; right: -5%;
            animation-duration: 10s;
            animation-delay: -4s;
        }
        .bg-orb:nth-child(3) {
            width: 300px; height: 300px;
            background: #a78bfa;
            top: 40%; left: 50%;
            animation-duration: 16s;
            animation-delay: -8s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(.95); }
        }

        /* Card */
        .login-card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 20px;
            padding: 2.75rem 2.5rem;
            width: 100%;
            max-width: 420px;
            margin: 1rem;
            animation: cardIn .6s cubic-bezier(.22,1,.36,1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            color: white;
            letter-spacing: -.02em;
        }
        .login-card .subtitle {
            font-size: .9rem;
            color: #94a3b8;
            text-align: center;
            margin: .35rem 0 2rem;
        }
        .field { margin-bottom: 1.15rem; }
        label {
            display: block;
            font-size: .8rem;
            font-weight: 600;
            margin-bottom: .4rem;
            color: #94a3b8;
            letter-spacing: .02em;
        }
        input {
            width: 100%;
            padding: .7rem .9rem;
            border: 1.5px solid rgba(255,255,255,.12);
            border-radius: 10px;
            font-size: .95rem;
            font-family: inherit;
            background: rgba(255,255,255,.06);
            color: white;
            transition: all .2s;
        }
        input::placeholder { color: #475569; }
        input:hover { border-color: rgba(255,255,255,.2); }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,.2);
            background: rgba(255,255,255,.08);
        }
        .btn {
            display: block;
            width: 100%;
            padding: .75rem 1rem;
            border-radius: 10px;
            border: none;
            font-size: .95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white;
            margin-top: 1.75rem;
            transition: all .2s;
            box-shadow: 0 2px 8px rgba(99,102,241,.35);
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99,102,241,.4);
        }
        .btn:active { transform: translateY(0); }
        .flash {
            padding: .65rem .85rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: .85rem;
            font-weight: 500;
            animation: flashIn .3s ease-out;
        }
        .flash.success { background: rgba(16,185,129,.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,.2); }
        .flash.error { background: rgba(239,68,68,.15); color: #fca5a5; border: 1px solid rgba(239,68,68,.2); }
        @keyframes flashIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="bg">
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
    <div class="bg-orb"></div>
</div>
<div class="login-card">
    <h1>TRA Treasurer</h1>
    <p class="subtitle">Sign in to manage your TRA finances</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, msg in messages %}
    <div class="flash {{ category }}">{{ msg }}</div>
    {% endfor %}
    {% endwith %}

    <form method="post">
        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus placeholder="Enter your username">
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn">Sign In</button>
    </form>
</div>
</body>
</html>
