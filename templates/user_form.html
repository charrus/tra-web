{% extends "base.html" %}
{% block title %}Add User - TRA Treasurer{% endblock %}
{% block content %}
<h1>Add User</h1>

<div class="card" style="max-width: 500px;">
    <form method="post">
        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required pattern="[a-zA-Z0-9_]+" placeholder="e.g. jsmith">
            <small style="color: var(--text-light);">Letters, numbers, and underscores only.</small>
        </div>
        <div class="field">
            <label for="name">Display Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Jane Smith">
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required minlength="4">
            <small style="color: var(--text-light);">Minimum 4 characters.</small>
        </div>
        <div class="field">
            <label for="role">Role</label>
            <select id="role" name="role">
                <option value="member">Member (view and edit transactions)</option>
                <option value="admin">Admin (full access including user management)</option>
            </select>
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-primary">Create User</button>
            <a href="{{ url_for('user_list') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
